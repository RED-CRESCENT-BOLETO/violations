let selectedV = null;

function doSearch() {
    const q = document.getElementById('vSearch').value.toLowerCase();
    const l = document.getElementById('resList');
    l.innerHTML = '';
    if(!q) { l.style.display = 'none'; return; }
    const filtered = db.filter(i => i.t.toLowerCase().includes(q));
    if(filtered.length > 0) {
        l.style.display = 'block';
        filtered.forEach(i => {
            const d = document.createElement('div');
            d.textContent = `[${i.cat.toUpperCase()}] ${i.t}`;
            d.onclick = () => {
                document.getElementById('vSearch').value = i.t;
                selectedV = i;
                l.style.display = 'none';
                const isFire = i.cat.includes("fire") || i.cat.includes("1m");
                document.getElementById('nameFieldContainer').style.display = isFire ? 'block' : 'none';
            };
            l.appendChild(d);
        });
    } else { l.style.display = 'none'; }
}

function normalize(id) {
    id = id.trim();
    if (id && !id.startsWith("<@")) return `<@${id}>`;
    return id;
}
