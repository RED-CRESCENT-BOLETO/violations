window.onload = () => {
    document.getElementById('decCount').textContent = `إجمالي القرارات المتاحة: ${db.length}`;
};

let sel = null;

function search() {
    const q = document.getElementById('vSearch').value.toLowerCase();
    const l = document.getElementById('resList');
    l.innerHTML = '';
    if(!q) { l.style.display = 'none'; return; }
    
    const filtered = db.filter(d => d.t.toLowerCase().includes(q) || d.text.toLowerCase().includes(q));
    
    filtered.forEach(d => {
        const div = document.createElement('div');
        div.textContent = d.t;
        div.onclick = () => {
            document.getElementById('vSearch').value = d.t;
            sel = d;
            l.style.display = 'none';
            document.getElementById('nameDiv').style.display = d.fire ? 'block' : 'none';
        };
        l.appendChild(div);
    });
    l.style.display = filtered.length > 0 ? 'block' : 'none';
}

function generate() {
    const idVal = document.getElementById('userId').value.trim();
    const id = idVal.startsWith('<@') ? idVal : `<@${idVal}>`;
    const name = document.getElementById('medicName').value.trim();
    const sig = document.getElementById('sigChoice').value;
    
    if(!idVal || !sel) return alert("⚠️ أكمل البيانات");

    let res = sel.text.replace("(SIG)", sig);
    if(sel.fire) {
        res = res.replace("()", id).replace("()", name ? name : "الاسم غير مسجل");
    } else {
        res = res.replace("()", id);
    }
    document.getElementById('output').textContent = res;
}

function copy(id) {
    navigator.clipboard.writeText(document.getElementById(id).textContent);
    alert("✅ تم النسخ بالتنسيق الأصلي!");
}
